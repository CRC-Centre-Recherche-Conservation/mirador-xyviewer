name: CI

on:
  pull_request:
    branches: [main, dev]
  # Also run on pushes to main so the CI badge in the README reflects main's state.
  push:
    branches: [main]

# Cancel superseded runs on the same ref, except on main where every push should be verified.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Test, Lint & Coverage (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        node-version: [22, 24]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      # Upload coverage only once (latest Node version) to avoid duplicate reports.
      - name: Upload coverage reports to Codecov
        if: matrix.node-version == 24
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Surface dependency vulnerabilities introduced BY THIS PR (not historical).
  # Posts a summary comment on the PR and fails only when the PR adds new
  # high/critical CVEs — much fairer than gating on the whole transitive tree.
  # Only runs on PRs; the action has no meaning on push events.
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  build:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    # Build only on PRs targeting main, or on pushes to main itself.
    if: github.base_ref == 'main' || github.ref == 'refs/heads/main'
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the package
        run: npm run build
