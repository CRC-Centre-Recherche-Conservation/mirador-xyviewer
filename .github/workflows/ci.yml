name: CI

on:
  pull_request:
    branches: [main, dev]
  # Also run on pushes to main so the CI badge in the README reflects main's state.
  push:
    branches: [main]

jobs:
  test:
    name: Test, Lint & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      # Runtime-deps vulnerability radar. Non-blocking because most CVEs surface
      # in transitive deps pulled by Mirador (lodash, dompurify, immutable, ...)
      # that we can't fix directly — Dependabot opens PRs when upstream patches
      # become available, and CodeQL covers vulnerable usage in our own code.
      - name: Security audit (runtime deps)
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

  # Surface dependency vulnerabilities introduced BY THIS PR (not historical).
  # Posts a summary comment on the PR and fails only when the PR adds new
  # high/critical CVEs — much fairer than gating on the whole transitive tree.
  # Only runs on PRs; the action has no meaning on push events.
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  build:
    name: Build package
    runs-on: ubuntu-latest
    # Build only on PRs targeting main, or on pushes to main itself.
    if: github.base_ref == 'main' || github.ref == 'refs/heads/main'
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build the package
        run: npm run build
